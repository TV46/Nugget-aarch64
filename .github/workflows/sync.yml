name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/leminlimez/Nugget.git
          git fetch upstream

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          cp -r .github/workflows /tmp/my-workflows

          git reset --hard upstream/main

          cp -r /tmp/my-workflows/* .github/workflows/
          git add .github/workflows/
          git commit -m "chore: sync upstream, restore custom workflows" || echo "Nothing to commit"
          git push origin main --force
